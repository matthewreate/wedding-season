<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Seasons — Master Overview</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #333; --text: #e8e8e8; --text-dim: #888;
    --accent: #f0c040;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
  .container { max-width:1200px; margin:0 auto; padding:20px; }

  .header { text-align:center; padding:50px 20px 30px; border-bottom:1px solid var(--border); margin-bottom:40px; }
  .header h1 { font-size:2.2rem; font-weight:700; letter-spacing:-0.5px; margin-bottom:8px; }
  .header .subtitle { color:var(--text-dim); font-size:1rem; font-weight:300; }

  .year-switcher { display:flex; justify-content:center; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
  .year-btn {
    padding:8px 18px; border-radius:999px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); cursor:pointer;
    font-size:0.82rem; font-weight:600; transition:all 0.2s;
  }
  .year-btn:hover { border-color:var(--accent); color:var(--text); }
  .year-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }

  .stats { display:flex; justify-content:center; gap:40px; padding:25px 0; margin-bottom:40px; flex-wrap:wrap; }
  .stat { text-align:center; }
  .stat-num { font-size:2.4rem; font-weight:700; color:var(--accent); line-height:1; }
  .stat-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); margin-top:4px; }

  .tabs { display:flex; justify-content:center; gap:8px; margin-bottom:40px; flex-wrap:wrap; }
  .tab {
    padding:10px 24px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); cursor:pointer;
    font-size:0.85rem; font-weight:500; transition:all 0.2s;
  }
  .tab:hover { border-color:var(--accent); color:var(--text); }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .section { display:none; }
  .section.active { display:block; }

  .list-table { width:100%; border-collapse:collapse; font-size:0.88rem; }
  .list-table thead th {
    text-align:left; padding:12px 16px; font-weight:600; font-size:0.72rem;
    text-transform:uppercase; letter-spacing:1.2px; color:var(--text-dim);
    border-bottom:2px solid var(--border);
  }
  .list-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  .list-table tbody tr:hover { background:var(--surface2); }
  .list-table td { padding:14px 16px; vertical-align:top; }
  .list-table .num { color:var(--text-dim); width:30px; }
  .month-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; vertical-align:middle; }
  .couple-name { font-weight:600; }
  .day-of-week { color:var(--text-dim); font-size:0.78rem; margin-left:6px; }

  .timeline-month { margin-bottom:36px; }
  .timeline-month-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .month-badge { padding:4px 14px; border-radius:6px; font-weight:700; font-size:0.85rem; color:#000; }
  .month-count { color:var(--text-dim); font-size:0.82rem; }
  .timeline-entry { display:flex; align-items:flex-start; gap:16px; padding:12px 0; margin-left:20px; border-left:2px solid var(--border); padding-left:20px; position:relative; }
  .timeline-entry::before { content:''; position:absolute; left:-6px; top:18px; width:10px; height:10px; border-radius:50%; background:var(--accent); }
  .timeline-date { min-width:96px; font-weight:600; font-size:0.9rem; }
  .timeline-info { flex:1; }
  .timeline-couple { font-weight:600; font-size:1rem; margin-bottom:2px; }
  .timeline-venue { color:var(--text-dim); font-size:0.85rem; }
  .cluster-warning { background:rgba(240,192,64,0.1); border:1px solid rgba(240,192,64,0.3); border-radius:8px; padding:10px 16px; margin:8px 0 8px 20px; font-size:0.82rem; color:var(--accent); }
  .density-bar { display:flex; gap:3px; margin-bottom:10px; align-items:flex-end; padding:24px 4px 28px; overflow-x:auto; }
  .density-col { flex:1; border-radius:4px 4px 0 0; position:relative; min-height:4px; min-width:20px; }
  .density-label { position:absolute; bottom:-22px; left:50%; transform:translateX(-50%); font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; white-space:nowrap; }
  .density-count { position:absolute; top:-20px; left:50%; transform:translateX(-50%); font-size:0.75rem; font-weight:600; }

  #map { width:100%; height:600px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px; }
  .map-legend { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-bottom:20px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:0.78rem; color:var(--text-dim); }
  .legend-dot { width:12px; height:12px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); }
  .leaflet-tile-container img { width:256.5px !important; height:256.5px !important; }
  .leaflet-popup-content-wrapper { background:#1a1a1a !important; color:#e8e8e8 !important; border-radius:8px !important; box-shadow:0 4px 20px rgba(0,0,0,0.5) !important; }
  .leaflet-popup-tip { background:#1a1a1a !important; }
  .leaflet-popup-content { font-family:'Inter',sans-serif !important; font-size:13px !important; line-height:1.5 !important; }
  .region-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-top:20px; }
  .region-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .region-card h4 { font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px; }
  .region-card .big { font-size:1.8rem; font-weight:700; color:var(--accent); }

  .intel-section { margin-bottom:36px; }
  .intel-heading { font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .load-chart { display:flex; gap:6px; align-items:flex-end; height:160px; padding:0 4px; margin-bottom:8px; }
  .load-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; justify-content:flex-end; }
  .load-bar { width:100%; border-radius:4px 4px 0 0; min-height:4px; }
  .load-count { font-size:0.8rem; font-weight:700; }
  .load-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
  .load-flag { font-size:0.7rem; height:14px; }
  .intel-stats-row { display:flex; gap:12px; margin-bottom:36px; flex-wrap:wrap; }
  .intel-stat { flex:1; min-width:120px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; text-align:center; }
  .intel-stat-n { font-size:2rem; font-weight:700; line-height:1; }
  .intel-stat-l { font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-top:4px; }
  .intel-stat-l small { display:block; margin-top:2px; font-size:0.68rem; }
  .cluster-card { background:var(--surface); border-radius:8px; padding:14px 16px; margin-bottom:10px; border:1px solid var(--border); }
  .cluster-header { display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
  .cluster-label { font-weight:700; font-size:0.9rem; }
  .cluster-badge { font-size:0.68rem; padding:2px 8px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .cluster-weddings { display:flex; flex-wrap:wrap; gap:6px; }
  .w-chip { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:0.75rem; }
  .travel-row { padding:12px 0; border-bottom:1px solid var(--border); }
  .travel-route { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
  .travel-name { font-weight:600; font-size:0.88rem; }
  .travel-arrow { color:var(--text-dim); }
  .travel-date { font-size:0.78rem; }
  .travel-meta { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .travel-miles { font-weight:700; font-size:0.9rem; }
  .travel-gap { font-size:0.78rem; color:var(--text-dim); background:var(--surface2); padding:2px 7px; border-radius:4px; }
  .recovery-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
  .recovery-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .recovery-days { font-size:2rem; font-weight:700; line-height:1; margin-bottom:4px; }
  .recovery-range { font-size:0.82rem; font-weight:600; margin-bottom:2px; }
  .recovery-after { font-size:0.75rem; color:var(--text-dim); }
  .risk-row { background:var(--surface); border-radius:8px; padding:12px 16px; margin-bottom:8px; border:1px solid var(--border); }

  .rev-section { margin-bottom:36px; }
  .rev-heading { font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .rev-summary-row { display:flex; gap:12px; margin-bottom:36px; flex-wrap:wrap; }
  .rev-summary-card { flex:1; min-width:140px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; text-align:center; }
  .rev-summary-n { font-size:2rem; font-weight:700; line-height:1; color:var(--accent); margin-bottom:4px; }
  .rev-summary-l { font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); }
  .rev-summary-l small { display:block; margin-top:2px; font-size:0.68rem; }
  .rev-month-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:8px; }
  .rev-month-row { display:flex; align-items:center; gap:12px; }
  .rev-month-name { width:52px; font-size:0.78rem; font-weight:600; text-align:right; flex-shrink:0; }
  .rev-bar-wrap { flex:1; background:var(--surface); border-radius:4px; height:28px; position:relative; overflow:hidden; }
  .rev-bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:10px; font-size:0.78rem; font-weight:600; color:#000; }
  .rev-month-meta { width:150px; font-size:0.78rem; color:var(--text-dim); flex-shrink:0; text-align:right; }
  .rev-month-meta strong { color:var(--text); }
  .rev-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  .rev-table thead th { text-align:left; padding:10px 14px; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); border-bottom:2px solid var(--border); }
  .rev-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  .rev-table tbody tr:hover { background:var(--surface2); }
  .rev-table td { padding:12px 14px; vertical-align:middle; }
  .rev-flag { display:inline-block; padding:3px 8px; border-radius:4px; font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .flag-heavy { background:rgba(248,113,113,0.15); color:#f87171; }
  .flag-solid { background:rgba(74,222,128,0.15); color:#4ade80; }
  .flag-light { background:rgba(148,163,184,0.15); color:#94a3b8; }
  .flag-ok { background:rgba(56,189,248,0.15); color:#38bdf8; }
  .rev-note { font-size:0.75rem; color:var(--text-dim); margin-top:10px; padding:10px 14px; background:var(--surface); border-radius:6px; border-left:2px solid var(--border); }

  .rec-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px 20px; margin-bottom:12px; }
  .rec-card.book_here { border-left:3px solid #4ade80; }
  .rec-card.avoid { border-left:3px solid #f87171; }
  .rec-card.raise_rate { border-left:3px solid #facc15; }
  .rec-card.protect { border-left:3px solid #f87171; }
  .rec-card.warning { border-left:3px solid #fb923c; }
  .rec-type { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; }
  .rec-type.book_here { color:#4ade80; }
  .rec-type.avoid { color:#f87171; }
  .rec-type.raise_rate { color:#facc15; }
  .rec-type.protect { color:#f87171; }
  .rec-type.warning { color:#fb923c; }
  .rec-title { font-weight:700; font-size:0.95rem; margin-bottom:6px; }
  .rec-body { font-size:0.83rem; color:var(--text-dim); line-height:1.6; }

  .ready-grid { display:flex; flex-direction:column; gap:6px; }
  .ready-row { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--surface); border-radius:6px; border:1px solid var(--border); font-size:0.82rem; }
  .ready-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .ready-couple { font-weight:600; flex:1; min-width:180px; }
  .ready-date { color:var(--text-dim); width:70px; flex-shrink:0; }
  .ready-status { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .ready-flags { color:var(--text-dim); font-size:0.75rem; }

  .notice-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    border-radius:10px;
    padding:18px 20px;
  }
  .notice-title { font-size:0.75rem; text-transform:uppercase; letter-spacing:1.4px; color:var(--accent); margin-bottom:8px; }
  .notice-body { font-size:0.85rem; color:var(--text-dim); line-height:1.6; }

  @media(max-width:768px) {
    .container { padding:12px; }
    .header { padding:30px 12px 20px; margin-bottom:24px; }
    .header h1 { font-size:1.4rem; }
    .header .subtitle { font-size:0.85rem; }

    .stats { gap:12px 20px; padding:16px 0; margin-bottom:24px; }
    .stat-num { font-size:1.6rem; }
    .stat-label { font-size:0.65rem; letter-spacing:1px; }

    .year-switcher { gap:6px; margin-bottom:20px; }
    .year-btn { padding:6px 14px; font-size:0.75rem; }

    .tabs { gap:6px; margin-bottom:24px; padding:0 4px; }
    .tab { padding:8px 14px; font-size:0.75rem; }

    .density-bar { gap:2px; }
    .density-col { min-width:14px; }
    .density-label { font-size:0.55rem; }
    .density-count { font-size:0.65rem; }

    .list-table { font-size:0.78rem; }
    .list-table thead th { padding:8px 10px; font-size:0.65rem; }
    .list-table td { padding:8px 10px; }

    .timeline-card { padding:10px; }
    .timeline-date { min-width:72px; font-size:0.8rem; }
    .timeline-couple { font-size:0.9rem; }
    .timeline-venue { font-size:0.78rem; }

    #map { height:350px; }
    .region-card .big { font-size:1.4rem; }

    .intel-stat { min-width:100px; padding:12px; }
    .intel-stat-n { font-size:1.6rem; }

    .rev-summary-card { min-width:100px; padding:14px; }
    .rev-summary-n { font-size:1.6rem; }
    .rev-table { font-size:0.78rem; }
    .rev-table thead th { padding:8px 10px; }
    .rev-table td { padding:8px 10px; }
    .rev-month-meta { width:auto; font-size:0.7rem; }

    .rec-card { padding:16px; }
    .rec-title { font-size:0.88rem; }
    .rec-body { font-size:0.78rem; }

    .ready-row { align-items:flex-start; flex-direction:column; gap:6px; padding:10px; }
    .ready-date { width:auto; }
    .ready-couple { min-width:unset; }

    .couple-panel { width:100%; max-width:100vw; right:-100%; }
    .couple-panel.open { right:0; }
  }

  
  
  
  
  
  
  
  
  
  
  
  
  /* ═══ Couple Panel ═══ */
  .couple-panel-overlay {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); z-index:1000; backdrop-filter:blur(2px);
    transition:opacity 0.2s;
  }
  .couple-panel-overlay.open { display:block; }
  .couple-panel {
    position:fixed; top:0; right:-520px; width:500px; max-width:90vw; height:100vh;
    background:var(--bg); border-left:1px solid var(--border); z-index:1001;
    overflow-y:auto; transition:right 0.3s cubic-bezier(0.4,0,0.2,1);
    padding:0; box-shadow:-8px 0 30px rgba(0,0,0,0.4);
  }
  .couple-panel.open { right:0; }
  .cp-header {
    position:sticky; top:0; background:var(--bg); z-index:10;
    padding:24px 24px 16px; border-bottom:1px solid var(--border);
  }
  .cp-close {
    position:absolute; top:16px; right:16px; background:none; border:none;
    color:var(--text-dim); font-size:1.4rem; cursor:pointer; padding:4px 8px;
    border-radius:4px; transition:all 0.15s;
  }
  .cp-close:hover { color:var(--text); background:var(--surface2); }
  .cp-couple-name { font-size:1.5rem; font-weight:700; margin-bottom:4px; padding-right:40px; }
  .cp-meta-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:8px; }
  .cp-email-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .cp-email-btn {
    display:inline-flex; align-items:center; gap:5px; padding:6px 14px;
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
    color:var(--text); font-size:0.75rem; font-weight:600; cursor:pointer;
    text-decoration:none; transition:all 0.15s; font-family:inherit;
  }
  .cp-email-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(240,192,64,0.08); }
  .cp-email-btn .cp-email-icon { font-size:0.8rem; }
  .cp-email-btn.planner { border-color:rgba(56,189,248,0.3); }
  .cp-email-btn.planner:hover { border-color:#38bdf8; color:#38bdf8; background:rgba(56,189,248,0.08); }
  .cp-badge {
    display:inline-block; padding:3px 10px; border-radius:4px;
    font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px;
  }
  .cp-badge.critical { background:rgba(248,113,113,0.2); color:#f87171; }
  .cp-badge.high { background:rgba(251,146,60,0.2); color:#fb923c; }
  .cp-badge.medium { background:rgba(56,189,248,0.2); color:#38bdf8; }
  .cp-badge.low { background:rgba(148,163,184,0.2); color:#94a3b8; }
  .cp-meta-item { font-size:0.78rem; color:var(--text-dim); }
  .cp-meta-item strong { color:var(--text); }

  .cp-body { padding:20px 24px 40px; }
  .cp-section { margin-bottom:24px; }
  .cp-section-title {
    font-size:0.68rem; font-weight:700; text-transform:uppercase;
    letter-spacing:1.5px; color:var(--text-dim); margin-bottom:10px;
    padding-bottom:6px; border-bottom:1px solid var(--border);
  }
  .cp-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:14px 16px; margin-bottom:8px;
  }
  .cp-card-accent { border-left:3px solid var(--accent); }
  .cp-kv { display:flex; justify-content:space-between; padding:5px 0; font-size:0.82rem; }
  .cp-kv-key { color:var(--text-dim); }
  .cp-kv-val { font-weight:500; text-align:right; max-width:60%; }
  .cp-list { list-style:none; padding:0; }
  .cp-list li {
    padding:8px 12px; margin-bottom:4px; background:var(--surface);
    border-radius:6px; border:1px solid var(--border); font-size:0.82rem;
    line-height:1.5;
  }
  .cp-list li::before { content:'→ '; color:var(--accent); font-weight:700; }
  .cp-risk-list li::before { content:'⚠ '; color:#fb923c; }
  .cp-timeline-item {
    font-size:0.8rem; padding:4px 0; color:var(--text-dim);
    border-bottom:1px solid rgba(51,51,51,0.5);
  }
  .cp-timeline-item:last-child { border-bottom:none; }
  .cp-empty { font-size:0.8rem; color:var(--text-dim); font-style:italic; padding:8px 0; }

  .cp-status-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .cp-status-cell {
    background:var(--surface); border:1px solid var(--border);
    border-radius:6px; padding:10px 12px; font-size:0.78rem;
  }
  .cp-status-label { color:var(--text-dim); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:4px; }
  .cp-status-val { font-weight:600; }
  .cp-status-val.ready { color:#4ade80; }
  .cp-status-val.partial, .cp-status-val.in_progress { color:#fb923c; }
  .cp-status-val.unknown { color:var(--text-dim); }

  .cp-contact-alert {
    background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3);

  /* ── Open Item Checklist ── */
  .cp-open-item {
    display:flex; align-items:flex-start; gap:10px;
    padding:9px 12px; margin-bottom:4px; background:var(--surface);
    border-radius:6px; border:1px solid var(--border); font-size:0.82rem;
    line-height:1.5; transition:all 0.2s; cursor:default;
  }
  .cp-open-item.done {
    background:rgba(74,222,128,0.06); border-color:rgba(74,222,128,0.2);
    opacity:0.6;
  }
  .cp-open-item.done .cp-item-text { text-decoration:line-through; color:var(--text-dim); }
  .cp-item-check {
    flex-shrink:0; width:16px; height:16px; margin-top:2px;
    border:2px solid var(--border); border-radius:4px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.15s; background:transparent;
  }
  .cp-item-check:hover { border-color:var(--accent); }
  .cp-item-check.checked { background:#4ade80; border-color:#4ade80; }
  .cp-item-check.checked::after { content:'✓'; font-size:10px; color:#000; font-weight:700; }
  .cp-item-text { flex:1; }
  .cp-item-done-label {
    font-size:0.68rem; color:#4ade80; font-weight:600;
    text-transform:uppercase; letter-spacing:0.5px; margin-top:3px;
    display:none;
  }
  .cp-open-item.done .cp-item-done-label { display:block; }
  .cp-item-server-offline {
    font-size:0.72rem; color:var(--text-dim); padding:8px 12px;
    background:var(--surface); border-radius:6px; border:1px solid var(--border);
    margin-bottom:8px; font-style:italic;
  }

  /* ── Note Dialog ── */
  .cp-note-dialog {
    display:none; position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%); z-index:1100;
    background:var(--bg); border:1px solid var(--border); border-radius:12px;
    padding:24px; width:380px; max-width:90vw;
    box-shadow:0 8px 40px rgba(0,0,0,0.6);
  }
  .cp-note-dialog.open { display:block; }
  .cp-note-dialog-overlay {

  .cp-note-dialog-overlay.open { display:block; }
  .cp-note-title { font-weight:700; font-size:0.95rem; margin-bottom:4px; }
  .cp-note-subtitle { font-size:0.75rem; color:var(--text-dim); margin-bottom:16px; }
  .cp-note-input {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:6px; color:var(--text); font-family:inherit;

  .cp-note-btn {
    padding:8px 18px; border-radius:6px; border:1px solid var(--border);

const monthNames = {"1": "Jan", "2": "Feb", "3": "Mar", "4": "Apr", "5": "May", "6": "Jun", "7": "Jul", "8": "Aug", "9": "Sep", "10": "Oct", "11": "Nov", "12": "Dec"};

let activeYear = "2026";
let activeSection = 'list';
let mapObj = null;

function getCurrentData() {
  return activeYear === 'all' ? allDashboardData : dashboardDataByYear[activeYear];
}

function renderYearSwitcher() {
  const el = document.getElementById('year-switcher');
  const buttons = availableYears.map(year => {
    const key = String(year);
    const active = activeYear === key ? ' active' : '';
    return `<button class="year-btn${active}" onclick="setActiveYear('${key}')">${year}</button>`;
  });
  buttons.push(`<button class="year-btn${activeYear === 'all' ? ' active' : ''}" onclick="setActiveYear('all')">All</button>`);
  el.innerHTML = buttons.join('');
}

function setActiveYear(year) {
  activeYear = String(year);
  refreshDashboard();
}

function showSection(id) {
  activeSection = id;
  refreshDashboard();
}

function syncTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.section === activeSection);
  });
}

function syncSections() {
  document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
  const activeId = activeSection === 'map' ? 'map-section' : activeSection;
  const section = document.getElementById(activeId);
  if (section) section.classList.add('active');
}

function clearRenderedContent() {
  document.getElementById('wedding-list-body').innerHTML = '';
  document.getElementById('density-bar').innerHTML = '';
  document.getElementById('timeline-content').innerHTML = '';
  document.getElementById('map-legend').innerHTML = '';
  document.getElementById('region-grid').innerHTML = '';
  document.getElementById('intel-content').innerHTML = '';
  document.getElementById('revenue-content').innerHTML = '';
  document.getElementById('recs-content').innerHTML = '';
  document.getElementById('readiness-content').innerHTML = '';
  if (mapObj) {
    mapObj.remove();
    mapObj = null;
  }
}

function renderSummary() {
  const data = getCurrentData();
  document.getElementById('dashboard-title').textContent = data.summary.title;
  document.getElementById('dashboard-subtitle').textContent = data.summary.subtitle;

  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = data.summary.stats.map(stat => `
    <div class="stat">
      <div class="stat-num" style="${stat.color ? `color:${stat.color}` : ''}">${stat.value}</div>
      <div class="stat-label">${stat.label}</div>
    </div>
  `).join('');
}

function renderNotice(targetId, title, body) {
  const el = document.getElementById(targetId);
  el.innerHTML = `
    <div class="notice-card">
      <div class="notice-title">${title}</div>
      <div class="notice-body">${body}</div>
    </div>
  `;
}

function monthNumber(dateStr) {
  return parseInt(dateStr.split('-')[1], 10);
}

function buildTimelineGroups(weddings) {
  const grouped = new Map();
  weddings.forEach(wedding => {
    const dt = new Date(`${wedding.date}T12:00:00`);
    const year = dt.getFullYear();
    const month = dt.getMonth() + 1;
    const key = `${year}-${String(month).padStart(2, '0')}`;
    if (!grouped.has(key)) {
      grouped.set(key, {
        key,
        year,
        month,
        label: `${monthNames[String(month)]} ${year}`,
        shortLabel: activeYear === 'all' ? `${monthNames[String(month)]} ${String(year).slice(2)}` : `${monthNames[String(month)]}`,
        weddings: [],
      });
    }
    grouped.get(key).weddings.push(wedding);
  });
  return [...grouped.values()].sort((a, b) => a.key.localeCompare(b.key));
}

function renderList() {
  const weddings = getCurrentData().weddings;
  const tbody = document.getElementById('wedding-list-body');
  weddings.forEach((wedding, index) => {
    const dateStr = new Date(`${wedding.date}T12:00:00`).toLocaleDateString('en-US', {
      month: 'short',
      day: 'numeric',
      year: 'numeric',
    });
    const month = monthNumber(wedding.date);
    tbody.innerHTML += `
      <tr>
        <td class="num">${index + 1}</td>
        <td><span class="month-dot" style="background:${monthColors[String(month)]}"></span><span class="couple-name">${wedding.couple}</span></td>
        <td>${dateStr}<span class="day-of-week">${wedding.day}</span></td>
        <td>${wedding.venue}</td>
        <td>${wedding.city}</td>
      </tr>
    `;
  });
}

function renderTimeline() {
  const groups = buildTimelineGroups(getCurrentData().weddings);
  if (!groups.length) return;

  const maxCount = Math.max(...groups.map(group => group.weddings.length));

  groups.forEach(group => {
    const count = group.weddings.length;
    const height = count > 0 ? Math.max(10, (count / maxCount) * 70) : 4;
    densityBar.innerHTML += `
      <div class="density-col" style="height:${height}px;background:${monthColors[String(group.month)] || '#444'}">
        <span class="density-count">${count}</span>
        <span class="density-label">${group.shortLabel}</span>
      </div>
    `;
  });

  const content = document.getElementById('timeline-content');
  groups.forEach(group => {
    let html = `

    `;

    group.weddings.forEach((wedding, index) => {
      const displayDate = new Date(`${wedding.date}T12:00:00`).toLocaleDateString('en-US', {

      html += `

            <div class="timeline-couple">${wedding.couple}</div>
            <a class="timeline-venue" href="https://maps.apple.com/?q=${encodeURIComponent(wedding.address || wedding.venue)}" style="text-decoration:none;color:inherit;" target="_blank">${wedding.venue} · ${wedding.city} ↗</a>
          </div>
        </div>
      `;
      if (index < group.weddings.length - 1) {
        const current = new Date(`${wedding.date}T12:00:00`);
        const next = new Date(`${group.weddings[index + 1].date}T12:00:00`);
        const gap = Math.round((next - current) / (1000 * 60 * 60 * 24));
        if (gap <= 2) {
          html += `<div class="cluster-warning">⚡ Back-to-back — ${gap === 1 ? 'next day' : `${gap} days apart`}</div>`;
        }
      }
    });

    html += `</div>`;
    content.innerHTML += html;
  });
}

function renderMap() {
  const weddings = getCurrentData().weddings;
  if (!weddings.length) return;

  mapObj = L.map('map', { scrollWheelZoom: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 18,
  }).addTo(mapObj);

  const legend = document.getElementById('map-legend');
  [...new Set(weddings.map(w => monthNumber(w.date)))].sort((a, b) => a - b).forEach(month => {
    legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${monthColors[String(month)]}"></div>${monthNames[String(month)]}</div>`;
  });

  const bounds = [];
  const placed = {};
  weddings.forEach(wedding => {
    const key = `${wedding.lat.toFixed(4)},${wedding.lon.toFixed(4)}`;
    const count = placed[key] || 0;
    placed[key] = count + 1;
    const lat = wedding.lat + count * 0.003;
    const lon = wedding.lon + count * 0.003;
    bounds.push([lat, lon]);

    const month = monthNumber(wedding.date);
    const color = monthColors[String(month)];
    const dateStr = new Date(`${wedding.date}T12:00:00`).toLocaleDateString('en-US', {
      month: 'short',
      day: 'numeric',
      year: 'numeric',
    });
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.6);box-shadow:0 0 8px ${color}80"></div>`,
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });
    L.marker([lat, lon], { icon })
      .addTo(mapObj)
      .bindPopup(`<strong>${wedding.couple}</strong><br>${dateStr} (${wedding.day})<br>${wedding.venue}<br><em>${wedding.address}</em>`);
  });

  if (bounds.length === 1) {
    mapObj.setView(bounds[0], 9);
  } else {
    mapObj.fitBounds(bounds, { padding: [30, 30] });
  }

  const regionGrid = document.getElementById('region-grid');
  const regions = {};
  weddings.forEach(wedding => {
    regions[wedding.region] = (regions[wedding.region] || 0) + 1;
  });
  Object.entries(regions).sort((a, b) => b[1] - a[1]).forEach(([region, count]) => {
    regionGrid.innerHTML += `<div class="region-card"><h4>${region}</h4><span class="big">${count}</span></div>`;
  });

  setTimeout(() => mapObj.invalidateSize(), 150);
}

function renderIntel() {
  const data = getCurrentData();
  if (!data.supportsIntelligence) {
    renderNotice('intel-content', 'Single-Year Only', data.intelReason);
    return;
  }

  const intel = data.intel;
  const el = document.getElementById('intel-content');
  if (!intel.monthly.length) return;

  const maxCount = Math.max(...intel.monthly.map(item => item.count));
  let html = `<div class="intel-section"><div class="intel-heading">Monthly Load</div><div class="load-chart">`;
  intel.monthly.forEach(item => {
    const height = Math.max(12, (item.count / maxCount) * 120);
    html += `
      <div class="load-col">
        <div class="load-count" style="color:${item.color}">${item.count}</div>
        <div class="load-bar" style="height:${height}px;background:${item.color};opacity:${0.5 + item.count / maxCount * 0.5}"></div>
        <div class="load-label">${item.month}</div>
        ${item.count >= 5 ? `<div class="load-flag" style="color:${item.count >= 7 ? '#f87171' : '#fb923c'}">${item.count >= 7 ? '🔴' : '🟠'}</div>` : '<div class="load-flag"></div>'}
      </div>
    `;
  });
  html += `</div></div>`;

  const busiest = intel.monthly.reduce((best, item) => item.count > best.count ? item : best);
  const backToBacks = intel.clusters.filter(cluster => cluster.days <= 1).length;
  html += `
    <div class="intel-stats-row">
      <div class="intel-stat"><div class="intel-stat-n" style="color:#f87171">${busiest.count}</div><div class="intel-stat-l">Busiest Month<br><small>${busiest.month}</small></div></div>
      <div class="intel-stat"><div class="intel-stat-n" style="color:#fb923c">${backToBacks}</div><div class="intel-stat-l">Back-to-Backs<br><small>consecutive days</small></div></div>
      <div class="intel-stat"><div class="intel-stat-n" style="color:#4ade80">${intel.recovery.length}</div><div class="intel-stat-l">Recovery Windows<br><small>14+ days</small></div></div>
      <div class="intel-stat"><div class="intel-stat-n" style="color:#f87171">${intel.risk.filter(item => item.level === 'critical').length}</div><div class="intel-stat-l">Critical Zones<br><small>Do Not Add</small></div></div>
    </div>
  `;

  html += `<div class="intel-section"><div class="intel-heading">Clusters &amp; Hot Zones</div>`;
  intel.clusters.forEach(cluster => {
    const color = { critical: '#f87171', high: '#fb923c', medium: '#facc15' }[cluster.risk] || '#888';
    html += `
      <div class="cluster-card" style="border-left:3px solid ${color}">
        <div class="cluster-header">
          <span class="cluster-label" style="color:${color}">${cluster.label}</span>
          <span class="cluster-badge" style="background:${color}22;color:${color}">${cluster.count} weddings · ${cluster.days}d span · ${cluster.risk.toUpperCase()}</span>
        </div>
        <div class="cluster-weddings">${cluster.weddings.map(wedding => `<span class="w-chip">${wedding}</span>`).join('')}</div>
      </div>
    `;
  });
  html += `</div>`;

  html += `<div class="intel-section"><div class="intel-heading">Travel Risk</div>`;
  intel.travel.forEach(item => {
    const color = item.flag === 'danger' ? '#f87171' : '#fb923c';
    html += `
      <div class="travel-row">
        <div class="travel-route"><span class="travel-name">${item.from}</span><span class="travel-arrow">→</span><span class="travel-name">${item.to}</span><span class="travel-date" style="color:var(--text-dim)">${item.date}</span></div>
        <div class="travel-meta"><span class="travel-miles" style="color:${color}">${item.miles}mi</span><span class="travel-gap">${item.gap === 1 ? 'back-to-back' : `${item.gap}d gap`}</span></div>
      </div>
    `;
  });
  html += `</div>`;

  html += `<div class="intel-section"><div class="intel-heading">Recovery Windows</div><div class="recovery-grid">`;
  intel.recovery.forEach(item => {
    const color = item.quality === 'great' ? '#4ade80' : '#38bdf8';
    html += `
      <div class="recovery-card" style="border-top:2px solid ${color}">
        <div class="recovery-days" style="color:${color}">${item.days}d</div>
        <div class="recovery-range">${item.start} → ${item.end}</div>
        <div class="recovery-after">After: ${item.after}</div>
      </div>
    `;
  });
  html += `</div></div>`;

  html += `<div class="intel-section"><div class="intel-heading">Risk Zones</div>`;
  intel.risk.forEach(item => {
    const color = item.level === 'critical' ? '#f87171' : '#fb923c';
    html += `
      <div class="risk-row" style="border-left:3px solid ${color}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-weight:600;color:${color}">${item.period}</span>
          <span class="cluster-badge" style="background:${color}22;color:${color}">${item.events} events · ${item.weeks} weeks · ${item.level.toUpperCase()}</span>
        </div>
        <div style="font-size:0.83rem;color:var(--text-dim)">${item.note}</div>
      </div>
    `;
  });
  html += `</div>`;

  el.innerHTML = html;
}

function renderRevenue() {
  const data = getCurrentData();
  const revenue = data.revenue;
  const el = document.getElementById('revenue-content');

  if (revenue.mode === 'years') {
    const years = revenue.years;
    const maxRev = Math.max(...years.map(item => item.revenue));
    const busiest = years.reduce((best, item) => item.revenue > best.revenue ? item : best);
    const average = years.length ? revenue.totalRevenue / years.length : 0;

    let html = `
      <div class="rev-section"><div class="rev-summary-row">
        <div class="rev-summary-card"><div class="rev-summary-n">${years.length}</div><div class="rev-summary-l">Seasons Included<small>Archive view</small></div></div>
        <div class="rev-summary-card"><div class="rev-summary-n">$${(revenue.totalRevenue / 1000).toFixed(0)}K</div><div class="rev-summary-l">Archive Revenue<small>All tracked years</small></div></div>
        <div class="rev-summary-card"><div class="rev-summary-n" style="color:#f87171">${busiest.year}</div><div class="rev-summary-l">Top Revenue Year<small>$${busiest.revenue.toLocaleString()}</small></div></div>
        <div class="rev-summary-card"><div class="rev-summary-n" style="color:#4ade80">$${(average / 1000).toFixed(1)}K</div><div class="rev-summary-l">Avg / Season<small>${years.length} seasons</small></div></div>
      </div></div>
    `;

    html += `<div class="rev-section"><div class="rev-heading">Revenue by Year</div><div class="rev-month-grid">`;
    years.forEach(item => {
      const pct = maxRev ? (item.revenue / maxRev) * 100 : 0;
      html += `
        <div class="rev-month-row">
          <div class="rev-month-name" style="color:${item.color}">${item.year}</div>
          <div class="rev-bar-wrap"><div class="rev-bar-fill" style="width:${pct}%;background:${item.color}">$${(item.revenue / 1000).toFixed(0)}K</div></div>
          <div class="rev-month-meta"><strong>${item.count}</strong> wedding${item.count !== 1 ? 's' : ''} · ${item.pct}%</div>
        </div>
      `;
    });
    html += `</div><div class="rev-note">Archive mode keeps revenue year-by-year. Pick a single season above for monthly revenue detail.</div></div>`;

    html += `<div class="rev-section"><div class="rev-heading">Year Summary</div><table class="rev-table"><thead><tr><th>Year</th><th>Weddings</th><th>Revenue</th><th>$/Wedding</th><th>Share</th></tr></thead><tbody>`;
    years.forEach(item => {
      html += `
        <tr>
          <td><span class="month-dot" style="background:${item.color}"></span>${item.year}</td>
          <td>${item.count}</td>
          <td>$${item.revenue.toLocaleString()}</td>
          <td>$${Math.round(item.revenue / item.count).toLocaleString()}</td>
          <td>${item.pct}%</td>
        </tr>
      `;
    });
    html += `</tbody></table></div>`;
    el.innerHTML = html;
    return;
  }

  const months = revenue.months;
  if (!months.length) return;
  const totalRev = revenue.totalRevenue;
  const maxRev = Math.max(...months.map(item => item.revenue));
  const highMonth = months.reduce((best, item) => item.revenue > best.revenue ? item : best);
  const lowMonth = months.reduce((best, item) => item.revenue < best.revenue ? item : best);

  let html = `
    <div class="rev-section"><div class="rev-summary-row">
      <div class="rev-summary-card"><div class="rev-summary-n">$${(totalRev / 1000).toFixed(0)}K</div><div class="rev-summary-l">Confirmed Total<small>${activeYear} Season</small></div></div>
      <div class="rev-summary-card"><div class="rev-summary-n">$${Math.round(totalRev / data.weddings.length).toLocaleString()}</div><div class="rev-summary-l">Per Wedding<small>All ${data.weddings.length} shows</small></div></div>
      <div class="rev-summary-card"><div class="rev-summary-n" style="color:#f87171">$${(highMonth.revenue / 1000).toFixed(0)}K</div><div class="rev-summary-l">Highest Month<small>${highMonth.month} · ${highMonth.count} shows</small></div></div>
      <div class="rev-summary-card"><div class="rev-summary-n" style="color:#94a3b8">$${(lowMonth.revenue / 1000).toFixed(0)}K</div><div class="rev-summary-l">Lowest Month<small>${lowMonth.month} · ${lowMonth.count} show${lowMonth.count > 1 ? 's' : ''}</small></div></div>
      <div class="rev-summary-card"><div class="rev-summary-n" style="color:#4ade80">$2K</div><div class="rev-summary-l">Baseline Rate<small>Archive input value</small></div></div>
    </div></div>
  `;

  html += `<div class="rev-section"><div class="rev-heading">Revenue by Month</div><div class="rev-month-grid">`;
  months.forEach(item => {
    const pct = maxRev ? (item.revenue / maxRev) * 100 : 0;
    html += `
      <div class="rev-month-row">
        <div class="rev-month-name" style="color:${item.color}">${item.month}</div>
        <div class="rev-bar-wrap"><div class="rev-bar-fill" style="width:${pct}%;background:${item.color}">$${(item.revenue / 1000).toFixed(0)}K</div></div>
        <div class="rev-month-meta"><strong>${item.count}</strong> wedding${item.count !== 1 ? 's' : ''} · ${item.pct}%</div>
      </div>
    `;
  });
  html += `</div><div class="rev-note">Revenue and workload remain scoped to the selected season. Switch to All above for the archive-wide year summary.</div></div>`;

  html += `<div class="rev-section"><div class="rev-heading">Workload vs. Revenue</div><table class="rev-table"><thead><tr><th>Month</th><th>Weddings</th><th>Revenue</th><th>$/Wedding</th><th>Load</th></tr></thead><tbody>`;
  months.forEach(item => {
    const load = item.count >= 7 ? 'Peak' : item.count >= 5 ? 'Heavy' : item.count <= 2 ? 'Light' : 'Steady';
    const cls = item.count >= 7 ? 'flag-solid' : item.count >= 5 ? 'flag-heavy' : item.count <= 2 ? 'flag-light' : 'flag-ok';
    html += `
      <tr>
        <td><span class="month-dot" style="background:${item.color}"></span>${item.month}</td>
        <td>${item.count}</td>
        <td>$${item.revenue.toLocaleString()}</td>
        <td>$${Math.round(item.revenue / item.count).toLocaleString()}</td>
        <td><span class="rev-flag ${cls}">${load}</span></td>
      </tr>
    `;
  });
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function renderReadiness() {
  const data = getCurrentData();
  if (!data.supportsReadiness) {
    renderNotice('readiness-content', 'Readiness Unavailable', data.readinessReason);
    return;
  }

  const readiness = data.readiness;
  const el = document.getElementById('readiness-content');
  const statusMeta = [
    { key: 'ready', label: 'Ready', color: '#4ade80' },
    { key: 'watch', label: 'Watch', color: '#38bdf8' },
    { key: 'needs attention', label: 'Needs Attention', color: '#fb923c' },
    { key: 'at risk', label: 'At Risk', color: '#f87171' },
  ];
  const statusColors = Object.fromEntries(statusMeta.map(item => [item.key, item.color]));
  const severityRank = { 'at risk': 0, 'needs attention': 1, 'watch': 2, 'ready': 3 };

  let html = `<div class="intel-stats-row" style="margin-bottom:24px">`;
  statusMeta.forEach(item => {
    const count = readiness.filter(wedding => wedding.status === item.key).length;
    html += `<div class="intel-stat"><div class="intel-stat-n" style="color:${item.color}">${count}</div><div class="intel-stat-l">${item.label}</div></div>`;
  });
  html += `</div><div class="ready-grid">`;

  [...readiness]
    .sort((a, b) => (severityRank[a.status] - severityRank[b.status]) || a.date.localeCompare(b.date))
    .forEach(item => {
      const color = statusColors[item.status] || '#888';
      const dateStr = new Date(`${item.date}T12:00:00`).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      html += `
        <div class="ready-row">
          <div class="ready-dot" style="background:${color}"></div>
          <div class="ready-couple">${item.couple}</div>
          <div class="ready-date">${dateStr}</div>
          <div class="ready-status" style="color:${color};min-width:120px">${item.status}</div>
          <div class="ready-flags">${item.flags.length ? item.flags.join(' · ') : ''} ${!item.music ? '· no music' : ''} ${!item.comms ? '· no comms' : ''} ${item.ws === 'received_blank' ? '· worksheet blank' : ''}</div>
        </div>
      `;
    });
  html += `</div>`;
  el.innerHTML = html;
}

function refreshDashboard() {
  renderYearSwitcher();
  syncTabs();
  syncSections();
  renderSummary();
  clearRenderedContent();

  if (activeSection === 'list') renderList();
  if (activeSection === 'timeline') renderTimeline();
  if (activeSection === 'map') renderMap();
  if (activeSection === 'intel') renderIntel();
  if (activeSection === 'revenue') renderRevenue();
  if (activeSection === 'recs') renderRecommendations();
  if (activeSection === 'readiness') renderReadiness();
}

function openCouplePanel(coupleName) {
  const d = (window.coupleDetails || {})[coupleName];
  if (!d) { console.warn('No detail data for', coupleName); return; }

  document.getElementById('cp-couple-name').textContent = d.couple;

  // Meta row: urgency badge + date + days out + stage
  const dateStr = new Date(d.date + 'T12:00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
  const daysLabel = d.daysOut > 0 ? d.daysOut + ' days out' : d.daysOut === 0 ? 'TODAY' : Math.abs(d.daysOut) + ' days ago';
  document.getElementById('cp-meta-row').innerHTML = `
    <span class="cp-badge ${d.urgency}">${d.urgency}</span>
    <span class="cp-meta-item"><strong>${dateStr}</strong></span>
    <span class="cp-meta-item">${daysLabel}</span>
    <span class="cp-meta-item">Stage: <strong>${d.stage}</strong></span>
  `;

  // Email buttons row
  let emailHtml = '';
  if (d.coupleEmails && d.coupleEmails.length > 0) {
    const mailto = 'mailto:' + d.coupleEmails.join(',');
    emailHtml += '<a class="cp-email-btn" href="' + mailto + '"><span class="cp-email-icon">✉</span>Email Couple</a>';
  }
  if (d.plannerEmail) {
    const plannerLabel = d.plannerName ? 'Email ' + escHtml(d.plannerName.split(' ')[0]) : 'Email Planner';
    emailHtml += '<a class="cp-email-btn planner" href="mailto:' + d.plannerEmail + '"><span class="cp-email-icon">✉</span>' + plannerLabel + '</a>';
  }
  document.getElementById('cp-email-row').innerHTML = emailHtml;

  // Build body sections
  let html = '';

  // ── Decision Block ──
  if (d.nextAction) {
    html += `<div class="cp-section">
      <div class="cp-section-title">Next Action</div>
      <div class="cp-card cp-card-accent" style="font-size:0.85rem;line-height:1.6">${escHtml(d.nextAction)}</div>`;
    if (d.nextActionDue) {
      html += `<div style="font-size:0.75rem;color:var(--text-dim);margin-top:4px">Due: <strong style="color:var(--text)">${d.nextActionDue}</strong></div>`;
    }
    html += `</div>`;
  }

  // ── Communication ──
  html += `<div class="cp-section"><div class="cp-section-title">Communication</div>`;
  if (d.daysSinceContact >= 0) {
    const contactDate = new Date(d.lastContact + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
    if (d.daysSinceContact > 14) {
      html += `<div class="cp-contact-alert">⚠ No contact in ${d.daysSinceContact} days (last: ${contactDate})</div>`;
    } else if (d.daysSinceContact > 7) {
      html += `<div style="background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.3);border-radius:6px;padding:10px 14px;font-size:0.8rem;color:#fb923c;margin-bottom:10px">Last contact: ${contactDate} (${d.daysSinceContact} days ago)</div>`;
    } else {
      html += `<div class="cp-contact-ok">Last contact: ${contactDate} (${d.daysSinceContact} days ago)</div>`;
    }
  } else {
    html += `<div class="cp-contact-alert">⚠ No contact date logged</div>`;
  }
  if (d.followupNeeded) {
    html += `<div style="background:rgba(240,192,64,0.15);border:1px solid rgba(240,192,64,0.3);border-radius:6px;padding:8px 14px;font-size:0.8rem;color:var(--accent);margin-bottom:10px">📧 Follow-up email needed</div>`;
  }
  if (d.finalCallNeeded) {
    html += `<div style="background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.3);border-radius:6px;padding:8px 14px;font-size:0.8rem;color:#38bdf8;margin-bottom:10px">📞 Final call needed</div>`;
  }
  if (d.recentComms && d.recentComms.length > 0) {
    html += `<ul class="cp-list">`;
    d.recentComms.forEach(c => { html += `<li>${escHtml(c)}</li>`; });
    html += `</ul>`;
  }
  html += `</div>`;

  // ── Planning Status ──
  html += `<div class="cp-section"><div class="cp-section-title">Planning Status</div>
    <div class="cp-status-grid">
      <div class="cp-status-cell"><div class="cp-status-label">Worksheet</div><div class="cp-status-val ${statusClass(d.worksheetStatus)}">${escHtml(d.worksheetStatus)}</div></div>
      <div class="cp-status-cell"><div class="cp-status-label">Music Inputs</div><div class="cp-status-val ${statusClass(d.musicStatus)}">${escHtml(shortStatus(d.musicStatus))}</div></div>
      <div class="cp-status-cell"><div class="cp-status-label">Run of Show</div><div class="cp-status-val ${statusClass(d.rosStatus)}">${escHtml(d.rosStatus)}</div></div>
      <div class="cp-status-cell"><div class="cp-status-label">Final Details</div><div class="cp-status-val ${statusClass(d.finalDetailsStatus)}">${escHtml(shortStatus(d.finalDetailsStatus))}</div></div>
    </div>
  </div>`;

  // ── Music ──
  html += buildMusicSection(d);

  // ── Open Items (interactive checklist) ──
  if (d.openItems && d.openItems.length > 0) {
    const serverOk = window.cpServerAvailable;
    html += `<div class="cp-section"><div class="cp-section-title">Open Items</div>`;
    if (!serverOk) {
      html += `<div class="cp-item-server-offline">ℹ Completion tracking offline — open dashboard via dock icon to enable</div>`;
    }
    d.openItems.forEach((item, idx) => {
      const itemId = `oi-${d.folder.replace(/[^a-z0-9]/gi,'-')}-${idx}`;
      const alreadyDone = (window.cpDoneItems || {})[itemId] || false;
      html += `
        <div class="cp-open-item${alreadyDone ? ' done' : ''}" id="${itemId}-row">
          <div class="cp-item-check${alreadyDone ? ' checked' : ''}" id="${itemId}-check"
               onclick="handleItemCheck('${itemId}', '${escAttr(item)}', '${escAttr(d.couple)}', '${escAttr(d.folder)}', ${serverOk ? 'true' : 'false'})"></div>
          <div style="flex:1">
            <div class="cp-item-text">${escHtml(item)}</div>
            <div class="cp-item-done-label">✓ done</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  // ── Money / Payment ──
  html += `<div class="cp-section"><div class="cp-section-title">Payment</div>`;
  if (d.paymentStatus) {
    html += `<div class="cp-card"><div style="font-size:0.85rem;line-height:1.6">${escHtml(d.paymentStatus)}</div></div>`;
  }
  if (d.invoiceTotal) {
    html += `<div class="cp-card"><div class="cp-kv"><span class="cp-kv-key">Rate</span><span class="cp-kv-val">${escHtml(d.invoiceRate)}</span></div>`;
    html += `<div class="cp-kv"><span class="cp-kv-key">Total</span><span class="cp-kv-val">${escHtml(d.invoiceTotal)}</span></div>`;
    html += `<div class="cp-kv"><span class="cp-kv-key">Status</span><span class="cp-kv-val">${escHtml(d.invoiceStatus)}</span></div>`;
    if (d.invoicePaidOn) { html += `<div class="cp-kv"><span class="cp-kv-key">Paid</span><span class="cp-kv-val">${escHtml(d.invoicePaidOn)}</span></div>`; }
    html += `</div>`;
  }
  if (!d.paymentStatus && !d.invoiceTotal) {
    html += `<div class="cp-empty">No payment data available</div>`;
  }
  html += `</div>`;

  // ── Risks ──
  if (d.risks && d.risks.length > 0) {
    html += `<div class="cp-section"><div class="cp-section-title">Risks / Waiting On</div><ul class="cp-list cp-risk-list">`;
    d.risks.forEach(r => { html += `<li>${escHtml(r)}</li>`; });
    html += `</ul></div>`;
  }

  // ── Day-of Timeline ──
  if (d.timeline && d.timeline.length > 0) {
    html += `<div class="cp-section"><div class="cp-section-title">Day-of Timeline</div><div class="cp-card">`;
    d.timeline.forEach(t => { html += `<div class="cp-timeline-item">${escHtml(t)}</div>`; });
    html += `</div></div>`;
  }

  // ── State Summary ──
  if (d.stateLines && d.stateLines.length > 0) {
    html += `<div class="cp-section"><div class="cp-section-title">Current State</div><div class="cp-card">`;
    d.stateLines.forEach(s => {
      const venueMatch = s.match(/^Venue:\s*(.+)$/);
      if (venueMatch) {
        const addr = venueMatch[1].trim();
        const mapsUrl = 'https://maps.apple.com/?q=' + encodeURIComponent(addr);
        html += `<div style="font-size:0.8rem;padding:3px 0;line-height:1.5">Venue: <a href="${mapsUrl}" style="color:var(--accent);text-decoration:underline;" target="_blank">${escHtml(addr)}</a> <span style="font-size:0.7rem;color:var(--text-dim)">↗</span></div>`;
      } else {
        html += `<div style="font-size:0.8rem;padding:3px 0;line-height:1.5">${escHtml(s)}</div>`;
      }
    });
    html += `</div></div>`;
  }

  document.getElementById('cp-body').innerHTML = html;
  document.getElementById('cp-overlay').classList.add('open');
  document.getElementById('cp-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

  document.getElementById('cp-overlay').classList.remove('open');
  document.getElementById('cp-panel').classList.remove('open');

}

// ── Music Section Builder ──
function buildMusicSection(d) {
  const SUBS = [
    { key: 'musicPrelude',    label: 'Ceremony Prelude' },
    { key: 'musicCeremony',   label: 'Ceremony' },
    { key: 'musicCocktail',   label: 'Cocktail Hour' },
    { key: 'musicDinner',     label: 'Dinner' },
    { key: 'musicSpecials',   label: 'Reception Specials' },
    { key: 'musicDancing',    label: 'Dancing' },
    { key: 'musicAfterparty', label: 'After Party' },
  ];

  // Count total populated subsections
  const totalItems = SUBS.reduce((acc, s) => acc + ((d[s.key] || []).length), 0);

  let html = '<div class="cp-section cp-music-section"><div class="cp-section-title">Music</div>';

  if (!d.hasMusic && totalItems === 0) {
    html += '<div class="cp-music-empty-state">No music data yet — Music.md not filled in.</div>';
    html += '</div>';
    return html;
  }

  html += '<div class="cp-music-subsections">';

  SUBS.forEach(function(sub, idx) {
    const items = d[sub.key] || [];
    const hasData = items.length > 0;
    // Auto-open the first subsection that has data, keep rest collapsed
    const isOpen = hasData && idx === SUBS.findIndex(s => (d[s.key] || []).length > 0);
    const subId = 'music-sub-' + d.folder.replace(/[^a-z0-9]/gi, '-') + '-' + idx;

    // Skip after party if empty
    if (sub.key === 'musicAfterparty' && !hasData) return;

    html += '<div class="cp-music-sub' + (isOpen ? ' open' : '') + '" id="' + subId + '">';
    html += '<div class="cp-music-sub-header" onclick="toggleMusicSub(this.parentElement.id)">';
    html += '<span>';
    html += '<span class="cp-music-sub-label' + (hasData ? ' has-data' : '') + '">' + sub.label + '</span>';
    if (hasData) {
      html += '<span class="cp-music-sub-meta">' + items.length + ' item' + (items.length !== 1 ? 's' : '') + '</span>';
    } else {
      html += '<span class="cp-music-sub-meta">TBD</span>';
    }
    html += '</span>';
    html += '<span class="cp-music-sub-chevron">▼</span>';
    html += '</div>';  // end header

    html += '<div class="cp-music-sub-body">';
    if (!hasData) {
      html += '<div class="cp-music-empty">Not filled in yet.</div>';
    } else {
      items.forEach(function(item) {
        const isRequest = item.startsWith('Request:');
        const hasStrike = item.includes('~~');
        let cls = 'cp-music-song';
        if (isRequest) cls += ' request';
        if (hasStrike) cls += ' strikethrough';
        const display = item.replace(/^Request:\s*/, '').replace(/~~([^~]+)~~/g, '$1');
        html += '<div class="' + cls + '">' + escHtml(display) + '</div>';
      });
    }
    html += '</div>';  // end body
    html += '</div>';  // end sub
  });

  html += '</div>';  // end subsections

  // Playlists filed
  if (d.musicPlaylists && d.musicPlaylists.length > 0) {
    html += '<div class="cp-music-playlists">';
    d.musicPlaylists.forEach(function(p) {
      html += '<div class="cp-music-playlist-item">' + escHtml(p) + '</div>';
    });
    html += '</div>';
  }

  // Do-not-play (collapsed by default, shown as a warning card)
  if (d.musicDoNotPlay && d.musicDoNotPlay.length > 0) {
    const dnpId = 'music-dnp-' + d.folder.replace(/[^a-z0-9]/gi, '-');
    html += '<div class="cp-music-dnp" id="' + dnpId + '">';
    html += '<div class="cp-music-dnp-title" style="cursor:pointer" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\'">';
    html += '🚫 Do Not Play (' + d.musicDoNotPlay.length + ')';
    html += '</div>';
    html += '<div id="' + dnpId + '-body" style="display:none">';
    d.musicDoNotPlay.forEach(function(item) {
      html += '<div class="cp-music-dnp-item">' + escHtml(item) + '</div>';
    });
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';  // end section
  return html;
}

function toggleMusicSub(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
}

// ── Session state ──
window.cpDoneItems = {};
window.cpServerAvailable = false;
window.cpPendingItem = null;

// ── Server availability check + keepalive ──
(function checkServer() {
  fetch('http://127.0.0.1:8766/ping', {signal: AbortSignal.timeout(1500)})
    .then(r => r.ok && (window.cpServerAvailable = true))
    .catch(() => { window.cpServerAvailable = false; });
})();
setInterval(function() {
  if (window.cpServerAvailable) {
    fetch('http://127.0.0.1:8766/ping', {signal: AbortSignal.timeout(1500)})
      .catch(() => { window.cpServerAvailable = false; });
  }
}, 60000);

// ── Escape helper for onclick attribute values ──
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,' ');
}

// ── Open item interaction ──
function handleItemCheck(itemId, itemText, couple, folder, serverOk) {
  const row = document.getElementById(itemId + '-row');
  const chk = document.getElementById(itemId + '-check');
  if (!row || !chk) return;

  // If already done, allow un-checking
  if (chk.classList.contains('checked')) {
    chk.classList.remove('checked');
    row.classList.remove('done');
    delete window.cpDoneItems[itemId];
    if (serverOk) {
      fetch('http://127.0.0.1:8766/uncomplete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({couple: couple, item_text: itemText})
      }).catch(() => {});
    }
    return;
  }

  if (serverOk) {
    // Show note dialog
    window.cpPendingItem = {itemId, itemText, couple, folder};
    document.getElementById('cp-note-item-label').textContent = itemText.length > 80 ? itemText.substring(0,80)+'…' : itemText;
    document.getElementById('cp-note-input').value = '';
    document.getElementById('cp-note-overlay').classList.add('open');
    document.getElementById('cp-note-dialog').classList.add('open');
    setTimeout(() => document.getElementById('cp-note-input').focus(), 50);
  } else {
    // Offline: mark visually only (no vault write)
    chk.classList.add('checked');
    row.classList.add('done');
    window.cpDoneItems[itemId] = true;
  }
}

function cancelNoteDialog() {
  document.getElementById('cp-note-overlay').classList.remove('open');
  document.getElementById('cp-note-dialog').classList.remove('open');
  window.cpPendingItem = null;
}

function confirmNoteDialog() {
  if (!window.cpPendingItem) return;
  const {itemId, itemText, couple, folder} = window.cpPendingItem;
  const note = document.getElementById('cp-note-input').value.trim();

  // Mark visually immediately
  const row = document.getElementById(itemId + '-row');
  const chk = document.getElementById(itemId + '-check');
  if (row) row.classList.add('done');
  if (chk) chk.classList.add('checked');
  window.cpDoneItems[itemId] = true;

  // Close dialog
  cancelNoteDialog();

  // POST to server
  fetch('http://127.0.0.1:8766/complete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({couple: couple, folder: folder, item_text: itemText, note: note})
  }).catch(err => {
    console.warn('Could not reach completion server:', err);
    // Revert visual state on failure
    if (row) row.classList.remove('done');
    if (chk) chk.classList.remove('checked');
    delete window.cpDoneItems[itemId];
  });
}

// Close note dialog on Enter (Shift+Enter for newline)
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && document.getElementById('cp-note-dialog').classList.contains('open')) {
    e.preventDefault();
    confirmNoteDialog();
  }
});

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function statusClass(s) {
  if (!s) return 'unknown';
  const l = s.toLowerCase();
  if (l.startsWith('ready')) return 'ready';
  if (l.startsWith('partial') || l.startsWith('in_progress') || l.startsWith('in progress')) return 'partial';
  return 'unknown';
}

function shortStatus(s) {
  if (!s) return 'unknown';
  // Trim after first — for display
  const dash = s.indexOf('—');
  if (dash > 0 && dash < 20) return s.substring(0, dash).trim();
  return s.length > 25 ? s.substring(0, 25) + '…' : s;
}

// Make couple names clickable everywhere
function activateCoupleLinks() {
  document.querySelectorAll('.couple-name, .timeline-couple, .ready-couple, .w-chip').forEach(el => {
    const name = el.textContent.trim();
    if (window.coupleDetails && window.coupleDetails[name]) {
      el.classList.add('clickable-couple');
      el.onclick = function(e) { e.stopPropagation(); openCouplePanel(name); };
    }
  });
}

// Hook into render cycle — re-activate links after each render
const _origRefresh = window.refreshDashboard;
if (_origRefresh) {
  window.refreshDashboard = function() {
    _origRefresh();
    setTimeout(activateCoupleLinks, 50);
  };
}

// Keyboard: Escape to close
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeCouplePanel();
});

// Initial activation
setTimeout(activateCoupleLinks, 100);


refreshDashboard();

</script>

  <div class="cp-header">
    <button class="cp-close" onclick="closeCouplePanel()" title="Close">&times;</button>
    <div class="cp-couple-name" id="cp-couple-name"></div>
    <div class="cp-meta-row" id="cp-meta-row"></div>
  </div>
  <div class="cp-body" id="cp-body"></div>
</div>
<div class="cp-note-dialog-overlay" id="cp-note-overlay" onclick="cancelNoteDialog()"></div>
<div class="cp-note-dialog" id="cp-note-dialog">
  <div class="cp-note-title">Mark complete</div>
  <div class="cp-note-subtitle" id="cp-note-item-label"></div>
  <textarea class="cp-note-input" id="cp-note-input" placeholder="Optional note (e.g. 'Sent to Sarah via email') — press Enter to skip"></textarea>
  <div class="cp-note-actions">
    <button class="cp-note-btn secondary" onclick="cancelNoteDialog()">Cancel</button>
    <button class="cp-note-btn primary" onclick="confirmNoteDialog()">Mark Done</button>
  </div>
</div>
